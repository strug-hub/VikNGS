<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>VikNGS — Variant Association Testing</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="/src/ui/style.css" />
  </head>
  <body>
    <header>
      <img src="/logo.png" alt="VikNGS" class="logo" />
      <div class="title">
        <h1>VikNGS</h1>
        <span class="sub">Variant integration kit for NGS — in-browser</span>
      </div>
      <nav class="tabs" role="tablist">
        <button class="tab active" data-tab="analysis" role="tab">Analysis</button>
        <button class="tab"        data-tab="simulation" role="tab">Simulation</button>
      </nav>
      <div class="spacer"></div>
      <div class="header-actions">
        <button id="preload-example-btn" class="secondary" type="button" title="Fill the form with the bundled example VCF + sample info">
          Preload example
        </button>
      </div>
    </header>

    <main>
      <section id="form-panel" class="panel">
        <!-- Analysis form -->
        <div class="tab-pane" data-tab="analysis">
          <h2>Inputs</h2>
          <form id="run-form"></form>
          <div class="actions">
            <button id="run-btn" type="button">Run analysis</button>
            <button id="stop-btn" type="button" disabled>Stop</button>
            <span id="run-status"></span>
          </div>
        </div>

        <!-- Simulation form -->
        <div class="tab-pane" data-tab="simulation" hidden>
          <h2>Simulation</h2>
          <form id="sim-form"></form>
          <div class="actions">
            <button id="sim-run-btn" type="button">Run simulation</button>
            <button id="sim-stop-btn" type="button" disabled>Stop</button>
            <span id="sim-status"></span>
          </div>
        </div>
      </section>

      <section id="log-panel" class="panel">
        <h2>Log</h2>
        <pre id="log"></pre>
      </section>

      <section id="results-panel" class="panel">
        <!-- Analysis results -->
        <div class="tab-pane" data-tab="analysis">
          <h2>Results</h2>
          <div id="manhattan"></div>
          <div id="results-table"></div>
        </div>
        <!-- Simulation results -->
        <div class="tab-pane" data-tab="simulation" hidden>
          <div class="sim-results-header">
            <h2>Simulation results</h2>
            <button id="sim-export-btn" class="secondary" type="button" disabled title="Export the result plots and tables as a self-contained HTML report">Export report</button>
          </div>
          <div id="sim-summary" class="sim-summary"></div>
          <div class="sim-power-row">
            <div id="sim-power"></div>
            <aside id="sim-sample-info" class="sim-sample"></aside>
          </div>
          <div class="sim-sub-row">
            <div id="sim-qq"></div>
            <div id="sim-hist"></div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
